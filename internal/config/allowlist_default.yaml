# Builtin default allowlist (schema v2).
#
# version: required; must be 2.
# commands: map argv0 basename -> policy. `{}` is valid.
#
# global (optional): only leading flags after argv0. Missing global or missing global.flags => none.
#   Do not use `must` under global.flags.
#
# root (optional): rest of argv. Missing root => flags any, operands any, no subcommands.
#   If root is present, missing flags or operands inside it => none each (set `any` explicitly when needed).
#
# flags: scalar `any`, `none`, or ""; or a mapping with at least one of any: true / allow / must / must_not:
#   allow — optional list of { short?, long?, value: none|required? }; each row needs short or long.
#   must  — same row shape; each listed option must appear before operands or a child subcommand.
#   must_not — forbidden options (short/long rows); only valid with open flags (any: true and no allow/must).
#   Rows may appear only under must (optional flags stay under allow). If the same option is in both,
#   the allow row sets value:. `--` is not allowed as a flag token.
#
# operands: scalar `any`, `none`, or "" only.
#
# subcommands: nested maps; the name is the key only (no `name` field). Under a node, missing flags =>
#   any, missing operands => any.
#
# Policy root with subcommands: a non-flag word must match a child name. Deeper nodes with subcommands
# and operands any may accept other non-flag words as operands.
#
# On first run or rewrite, an editable copy may be written beside the config as allowlist.yaml.

