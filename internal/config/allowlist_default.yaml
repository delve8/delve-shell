# Builtin default allowlist (schema v2).
#
# Top-level shape
# ---------------
# - `version` (required): must equal 2 for this schema.
# - `commands` (required): map basename -> policy object. Keys are argv0 basenames.
#
# Policy object (`commands.<name>`)
# --------------------------------
# Optional keys only; an empty `{}` policy is valid.
#
# - `global` (optional object): describes tokens before the first non-flag operand / subcommand
#   segment, for tools that separate "global" options from the rest.
#   - `flags` (optional): a Flag rule (see below). If the whole `global` key is absent,
#     effective global flags are `none`. If `global` is present but `flags` is omitted, the field
#     zero-decodes to `none`.
#
# - `root` (optional object): describes argv after argv0 for that tool: interleaved flags and
#   operands, plus an optional subcommand tree.
#   - `flags`, `operands`: Flag rule and Operands rule (see below).
#   - `subcommands` (optional): map subcommand name -> subcommand node (see below).
#   If the `root` key is **absent**, the loader applies the effective root default (see below).
#   If `root` is **present** (even as `{}`), omitted `flags` / `operands` inside it zero-decode to
#   `none` each—not `any`. Use explicit `flags: any` / `operands: any` when the root segment should
#   accept unrestricted flags and/or operands.
#
# Flag rule
# ---------
# YAML is either:
#
# 1) **Scalar** — one of:
#    - `any` — any `-x` / `--long` tokens allowed (subject to parser details; `--` is rejected).
#    - `none` — no flag tokens allowed at this node.
#    - `""` (empty string) — treated like `none`.
#
# 2) **Mapping** — exactly:
#        flags:
#          allow:
#            - short: <1-char>   # optional
#              long: <name>      # optional; at least one of short/long per entry
#              value: none | required   # optional; `required` means a separate token or `=value`
#    `allow` must be non-empty. Validation rejects entries with both short and long empty.
#
# At match time, if `global.flags` is an allow-list, that list is **prepended** to a node's
# allow-list when the node’s local rule is also allow-list; if the local rule is `none`, the
# effective rule becomes an allow-list containing **only** those global entries; if the local rule
# is `any`, global allow-list does not merge (local `any` wins).
#
# Operands rule
# -------------
# YAML is a **scalar** only:
# - `any` — non-flag tokens may appear where operands are consumed.
# - `none` or `""` — operands disallowed at that position (only flags until the segment ends or
#   a subcommand is taken).
# No mapping form exists for `operands`.
#
# Subcommand node
# ---------------
# Under `root.subcommands` or nested `subcommands`, each value is a map (the subcommand name is
# **only** the map key; do not add a `name` field).
#
# Optional fields:
# - `flags` — Flag rule, pointer-backed: **omitted key** ⇒ effective `any` (unlike `root`, where
#   omission inside a present `root` block means `none`).
# - `operands` — Operands rule, pointer-backed: **omitted key** ⇒ effective `any`.
# - `subcommands` — nested map of the same shape, arbitrary depth.
#
# Matching walks argv left-to-right: globals (if any) are consumed first as leading `-` tokens only;
# then each segment uses the current node's merged flag rule and operands rule. If `subcommands` is
# non-empty and the next token does not start with `-`, the matcher first tries that token as a child
# name; on success it recurses into that child for the rest of argv. At the policy `root` only, when
# `subcommands` is non-empty, a non-flag token that is **not** a child key fails the match (there is
# no operand bypass at that top segment). Deeper nodes pass a different mode: if `subcommands` is
# non-empty but the token is not a child key and `operands` is `any`, the token is consumed as an
# operand at that level instead of descending (structured read-only CLI matcher).
# Inner nodes can be pure branches (`subcommands` only), pure leaves (`flags` / `operands` only), or
# both.
#
# Effective root default
# ----------------------
# When `root` is **absent** on a policy: effective `flags` = `any`, effective `operands` = `any`,
# empty `subcommands`. This is what makes `commands: { tool: {} }` mean "argv0 allowed, tail open".
#
# User copy
# ---------
# On first run or rewrite, an editable copy is written beside the config as allowlist.yaml.

