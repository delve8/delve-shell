<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="4 2 24 24" fill="none" aria-hidden="true">
  <title>delve-shell - infinite exploration in the shell</title>
  <!-- Mark: horizontal 8 / infinity + chevron (->) -->
  <!-- 8: rotate +90° around (11,14), scale(1.22); gap opens to the right toward > -->
  <g transform="translate(11 14) rotate(90) scale(1.22) translate(-11 -14)">
    <path
      d="M 11 14 C 13.25 16.4 13.25 18.5 11 18.5 C 8.75 18.5 8.75 16.4 11 14 M 11 14 C 12.75 11.5 12.75 10 12.5 9.5 M 9.5 9.5 C 9.25 10 9.25 11.5 11 14"
      stroke="currentColor"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>
  <!-- Chevron, slightly heavier stroke -->
  <path d="M 20 9 L 26 14 L 20 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
